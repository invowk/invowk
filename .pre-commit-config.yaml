# SPDX-License-Identifier: MPL-2.0
#
# Pre-commit hooks for Invowk
#
# Install: pip install pre-commit && pre-commit install
# Or: make install-hooks

repos:
  - repo: local
    hooks:
      - id: golangci-lint
        name: normalized golangci-lint gate (root + tools/goplint)
        entry: "bash -c 'make lint 2>&1'"
        language: system
        pass_filenames: false
        always_run: true
        verbose: true

      - id: goplint-baseline
        name: goplint baseline check
        entry: "bash -c 'make check-baseline 2>&1'"
        language: system
        pass_filenames: false
        files: '^(cmd/|internal/|pkg/|tools/goplint/|docs/goplint/|openspec/specs/(goplint-analysis-soundness|goplint-soundness-assurance|lint-tooling-quality-gates)/|Makefile$|\.pre-commit-config\.yaml$|\.github/workflows/(lint|goplint-fuzz|mutation-testing)\.yml$)'
        always_run: true
        verbose: true

      - id: goplint-exceptions
        name: goplint exception governance
        entry: "bash -c 'make check-goplint-exceptions 2>&1'"
        language: system
        pass_filenames: false
        files: '^(cmd/|internal/|pkg/|tools/goplint/|docs/goplint/|openspec/specs/(goplint-analysis-soundness|goplint-soundness-assurance|lint-tooling-quality-gates)/|Makefile$|\.pre-commit-config\.yaml$|\.github/workflows/(lint|goplint-fuzz|mutation-testing)\.yml$)'
        always_run: true
        verbose: true

      - id: goplint-behavior
        name: canonical goplint soundness core gate
        entry: "bash -c 'make check-goplint-soundness-core 2>&1'"
        language: system
        pass_filenames: false
        files: '^(cmd/|internal/|pkg/|tools/goplint/|docs/goplint/|openspec/specs/(goplint-analysis-soundness|goplint-soundness-assurance|lint-tooling-quality-gates)/|Makefile$|\.pre-commit-config\.yaml$|\.github/workflows/(lint|goplint-fuzz|mutation-testing)\.yml$)'
        always_run: true
        verbose: true

      - id: windows-cross-build
        name: windows cross-compile gate
        entry: "bash -c 'make check-windows-build 2>&1'"
        language: system
        pass_filenames: false
        files: '^(cmd/|internal/|pkg/|tools/goplint/|go\.mod$|go\.sum$|tools/goplint/go\.mod$|tools/goplint/go\.sum$|scripts/check-windows-build\.sh$|Makefile$|\.pre-commit-config\.yaml$)'
        verbose: true

      - id: pgo-staleness
        name: pgo staleness advisory
        entry: "bash -c 'if git diff --cached --name-only | grep -Ev \"_test\\.go$\" | grep -Eq \"^(pkg/cueutil/|pkg/invowkfile/|pkg/invowkmod/|internal/discovery/)\"; then if ! git diff --cached --name-only | grep -Eq \"^default\\.pgo$\"; then echo \"\" >&2; echo \"⚠ PGO advisory: hot-path files changed without updating default.pgo\" >&2; echo \"  Run: make pgo-profile-parse-discovery && git add default.pgo\" >&2; echo \"  (CI will auto-fix if you forget, but local regeneration is preferred)\" >&2; echo \"\" >&2; fi; fi; exit 0'"
        language: system
        pass_filenames: false
        files: '^(pkg/cueutil/|pkg/invowkfile/|pkg/invowkmod/|internal/discovery/)'
        verbose: true

      - id: sonar-local
        name: sonar-local
        entry: "bash -c 'make sonar-local 2>&1'"
        language: system
        pass_filenames: false
        always_run: true
        verbose: true
