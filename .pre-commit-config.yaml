# SPDX-License-Identifier: MPL-2.0
#
# Pre-commit hooks for Invowk
#
# Install: pip install pre-commit && pre-commit install
# Or: make install-hooks

repos:
  - repo: https://github.com/golangci/golangci-lint
    rev: v2.10.1
    hooks:
      - id: golangci-lint
        name: golangci-lint (ci parity)
        entry: golangci-lint run
        args: [--config=.golangci.toml, ./...]
        pass_filenames: false
        always_run: true

  - repo: local
    hooks:
      - id: goplint-baseline
        name: goplint baseline check
        entry: "bash -c 'make check-baseline 2>&1'"
        language: system
        pass_filenames: false
        files: '^(cmd/|internal/|pkg/|tools/goplint/|Makefile$|\.pre-commit-config\.yaml$|\.github/workflows/lint\.yml$)'
        always_run: true
        verbose: true

      - id: goplint-behavior
        name: goplint behavior gates
        entry: "bash -c './tools/goplint/scripts/check-semantic-spec.sh && ./tools/goplint/scripts/check-ifds-compat.sh && ./tools/goplint/scripts/check-cfg-refinement.sh && make check-cfg-alias 2>&1'"
        language: system
        pass_filenames: false
        files: '^(cmd/|internal/|pkg/|tools/goplint/|Makefile$|\.pre-commit-config\.yaml$|\.github/workflows/lint\.yml$)'
        always_run: true
        verbose: true

      - id: pgo-staleness
        name: pgo staleness advisory
        entry: "bash -c 'if git diff --cached --name-only | grep -Ev \"_test\\.go$\" | grep -Eq \"^(pkg/cueutil/|pkg/invowkfile/|pkg/invowkmod/|internal/discovery/)\"; then if ! git diff --cached --name-only | grep -Eq \"^default\\.pgo$\"; then echo \"\" >&2; echo \"⚠ PGO advisory: hot-path files changed without updating default.pgo\" >&2; echo \"  Run: make pgo-profile-parse-discovery && git add default.pgo\" >&2; echo \"  (CI will auto-fix if you forget, but local regeneration is preferred)\" >&2; echo \"\" >&2; fi; fi; exit 0'"
        language: system
        pass_filenames: false
        files: '^(pkg/cueutil/|pkg/invowkfile/|pkg/invowkmod/|internal/discovery/)'
        verbose: true

      - id: sonar-local
        name: sonar-local
        entry: "bash -c 'make sonar-local 2>&1'"
        language: system
        pass_filenames: false
        files: '^(sonar-project\.properties$|\.sonarcloud\.properties$|scripts/sonar-local\.sh$|Makefile$|\.pre-commit-config\.yaml$)'
        verbose: true
