# SonarQube Cloud project configuration for invowk

sonar.organization=invowk
sonar.projectKey=invowk_invowk

sonar.sources=cmd,internal,pkg
sonar.tests=cmd,internal,pkg,tests
sonar.test.inclusions=**/*_test.go
# Note: sonar.go.coverageReportPaths is intentionally omitted. SonarCloud uses
# automatic analysis (GitHub App) which cannot access CI-generated artifacts.
# Coverage data is collected by CI via -coverprofile but not fed to SonarCloud.
# CPD exclusions: test files (repetitive setup) and hexagonal boundary validation
# files (intentional structural duplication between CLI and service layer).
sonar.cpd.exclusions=**/*_test.go,cmd/invowk/app_validate.go,internal/app/commandsvc/types_validate.go

sonar.exclusions=**/testdata/**,**/vendor/**,specs/**,modules/**,third_party/**,builtin/**,tools/goplint/**

# Suppress false-positive and intentional-pattern rules.
# IDs must be gapless (e1, e2, e3, ...).
#
# - go:S100: Go test functions use underscores (TestFoo_Bar) — idiomatic, not a naming violation.
# - go:S1192: Test files intentionally repeat string literals in assertions and fixtures.
# - godre:S8196: Single-method interface naming — Go domain interfaces (Clock, CommandService,
#   CapturingRuntime) use descriptive names rather than the "-er" suffix convention.
# - godre:S8242: Context in struct — intentional lifecycle ownership in servers and TUI components
#   (serverbase.Base, tui.InteractiveModel, tui.SpinnerModel, runtime.ExecutionContext).
# - go:S3776 globally: Cognitive complexity findings are inherent to validation, code generation,
#   TUI event handlers, container execution, and module resolution. Refactoring would scatter
#   cohesive logic across many small helpers, reducing readability without improving safety.
# - go:S107: CLI adapter helpers and service port constructors intentionally accept several
#   boundary values rather than hiding call-site wiring in opaque option bags.
# - go:S2612: Test files intentionally use broad permissions (0o755) for directory creation and
#   permission-testing scenarios. These are temp dirs cleaned up by t.TempDir().
# - go:S1313: Test files use hardcoded RFC 1918 IP addresses (10.0.0.1) as fixtures for
#   reverse shell and network exfiltration pattern detection. No connections are made.
# - go:S1313 in dependency_host.go: public resolver IPs are bounded connectivity probes with
#   no credential or data transfer semantics.
sonar.issue.ignore.multicriteria=e1,e2,e3,e4,e5,e6,e7,e8,e9,e10,e11
sonar.issue.ignore.multicriteria.e1.ruleKey=go:S100
sonar.issue.ignore.multicriteria.e1.resourceKey=**/*_test.go
sonar.issue.ignore.multicriteria.e2.ruleKey=go:S1192
sonar.issue.ignore.multicriteria.e2.resourceKey=**/*_test.go
sonar.issue.ignore.multicriteria.e3.ruleKey=godre:S8196
sonar.issue.ignore.multicriteria.e3.resourceKey=**/*.go
sonar.issue.ignore.multicriteria.e4.ruleKey=godre:S8242
sonar.issue.ignore.multicriteria.e4.resourceKey=**/*.go
sonar.issue.ignore.multicriteria.e5.ruleKey=go:S3776
sonar.issue.ignore.multicriteria.e5.resourceKey=**/*.go
sonar.issue.ignore.multicriteria.e6.ruleKey=go:S2612
sonar.issue.ignore.multicriteria.e6.resourceKey=**/*_test.go
sonar.issue.ignore.multicriteria.e7.ruleKey=go:S1313
sonar.issue.ignore.multicriteria.e7.resourceKey=**/*_test.go
sonar.issue.ignore.multicriteria.e8.ruleKey=go:S107
sonar.issue.ignore.multicriteria.e8.resourceKey=cmd/invowk/tui_style.go
sonar.issue.ignore.multicriteria.e9.ruleKey=go:S107
sonar.issue.ignore.multicriteria.e9.resourceKey=internal/app/commandsvc/service.go
sonar.issue.ignore.multicriteria.e10.ruleKey=go:S107
sonar.issue.ignore.multicriteria.e10.resourceKey=internal/app/deps/deps.go
sonar.issue.ignore.multicriteria.e11.ruleKey=go:S1313
sonar.issue.ignore.multicriteria.e11.resourceKey=internal/app/commandadapters/dependency_host.go
