# SonarQube Cloud project configuration for invowk

sonar.organization=invowk
sonar.projectKey=invowk

sonar.sources=cmd,internal,pkg
sonar.tests=cmd,internal,pkg,tests
sonar.test.inclusions=**/*_test.go

sonar.exclusions=**/testdata/**,**/vendor/**,specs/**,modules/**,third_party/**,builtin/**

# Import issues generated from local golangci-lint runs.
sonar.go.golangci-lint.reportPaths=.sonar/reports/golangci-checkstyle.xml
