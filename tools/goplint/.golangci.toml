#
# golangci-lint configuration for tools/goplint module.
# This module is linted separately from the root module.

version = "2"

[run]
modules-download-mode = "readonly"
tests = true
go = ""

[linters]
default = "none"
enable = [
    # modernize: A suite of analyzers that suggest simplifications to Go code,
    # using modern language and library features.
    "modernize",

    # forbidigo: Forbids identifiers.
    "forbidigo",

    # usetesting: Reports uses of functions with replacement inside the testing
    # package. [auto-fix]
    "usetesting",

    # errcheck: Checks for unchecked errors.
    "errcheck",

    # errorlint: Finds code that can break Go 1.13+ error wrapping.
    "errorlint",

    # govet: Reports suspicious constructs in Go code.
    "govet",

    # staticcheck: Bug-finding and correctness checks.
    "staticcheck",

    # exhaustive: Ensures enum-style switches are exhaustive.
    "exhaustive",

    # unused: Finds unused constants, variables, functions, and types.
    "unused",

    # ineffassign: Detects ineffective assignments.
    "ineffassign",

    # copyloopvar: Detects loop variable capture mistakes.
    "copyloopvar",

    # unconvert: Reports unnecessary type conversions.
    "unconvert",

    # wastedassign: Finds assignments that are overwritten before being read.
    "wastedassign",

    # depguard: Restricts forbidden imports.
    "depguard",

    # gosec: Security-focused static analysis.
    "gosec",

    # gocheckcompilerdirectives: Validates //go: compiler directives.
    "gocheckcompilerdirectives",
]

[linters.settings.forbidigo]
forbid = [
    # Go 1.26+ supports typed extraction via errors.AsType[T].
    { pattern = '^errors\.As$', msg = "use errors.AsType[T] (Go 1.26+)" },
]

[linters.settings.usetesting]
# Scope this to context modernization. Keep os.* helper checks disabled to
# avoid unrelated policy churn in this module.
os-create-temp = false
os-mkdir-temp = false
os-setenv = false
os-temp-dir = false
os-chdir = false
context-background = true
context-todo = true

[linters.settings.errcheck]
# Keep type assertion checks disabled to avoid noise in analyzer fixture code.
check-type-assertions = false
check-blank = true

[linters.settings.staticcheck]
# Keep bug-finding checks while avoiding quick-fix/style churn.
checks = ["all", "-QF*"]

[linters.settings.exhaustive]
# Treat explicit default branches as intentionally exhaustive.
default-signifies-exhaustive = true

[linters.settings.gosec]
excludes = [
    "G104",  # Unhandled errors - covered by errcheck.
    "G115",  # Integer conversion overflow - noisy for analyzer internals.
    "G204",  # Subprocess with variable - required for self-reexec.
    "G301",  # Directory permissions - module intentionally writes readable artifacts.
    "G302",  # File permissions - same rationale as root policy.
    "G304",  # File inclusion via variable - analyzer reads user-controlled files by design.
    "G306",  # WriteFile permissions - same rationale as root policy.
    "G702",  # Command execution taint - intentional in command analyzer context.
    "G703",  # Path traversal taint - false positives on managed paths.
    "G704",  # SSRF taint - false positives for local analysis flows.
    "G705",  # XSS taint - not relevant to CLI output.
]

[linters.settings.gosec.config.global]
tests = false

[linters.settings.depguard]
[linters.settings.depguard.rules.main]
files = ["$all", "!$test"]
list-mode = "lax"

[[linters.settings.depguard.rules.main.deny]]
pkg = "io/ioutil"
desc = "deprecated since Go 1.16; use io and os packages"

[linters.settings.depguard.rules.tests]
files = ["$test"]
list-mode = "lax"

[[linters.settings.depguard.rules.tests.deny]]
pkg = "github.com/stretchr/testify"
desc = "project uses standard testing library"

[linters.exclusions]
generated = "lax"

# Enforce errors.AsType[T] in non-test code.
[[linters.exclusions.rules]]
linters = ["forbidigo"]
path = "_test\\.go$"

[issues]
max-issues-per-linter = 0
max-same-issues = 0
uniq-by-line = false

[formatters]
enable = [
    # gofmt: Standard Go formatter.
    "gofmt",

    # gofumpt: Stricter gofmt-compatible formatter.
    "gofumpt",

    # goimports: Formats and fixes imports.
    "goimports",
]

[formatters.settings.gofumpt]
module-path = "github.com/invowk/invowk/tools/goplint"

[formatters.exclusions]
generated = "lax"
