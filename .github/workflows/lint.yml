name: Lint

on:
  push:
    branches:
      - main
    paths:
      - 'cmd/**'
      - 'internal/**'
      - 'pkg/**'
      - 'tests/**'
      - '*.go'
      - 'go.mod'
      - 'go.sum'
      - '.golangci.toml'
      - 'sonar-project.properties'
      - '.sonarcloud.properties'
      - '.pre-commit-config.yaml'
      - 'Makefile'
      - 'AGENTS.md'
      - '.agents/**'
      - 'scripts/check-agent-docs.sh'
      - 'scripts/check-file-length.sh'
      - '.github/workflows/lint.yml'
      - 'tools/goplint/**'
  pull_request:
    branches:
      - main
    paths:
      - 'cmd/**'
      - 'internal/**'
      - 'pkg/**'
      - 'tests/**'
      - '*.go'
      - 'go.mod'
      - 'go.sum'
      - '.golangci.toml'
      - 'sonar-project.properties'
      - '.sonarcloud.properties'
      - '.pre-commit-config.yaml'
      - 'Makefile'
      - 'AGENTS.md'
      - '.agents/**'
      - 'scripts/check-agent-docs.sh'
      - 'scripts/check-file-length.sh'
      - '.github/workflows/lint.yml'
      - 'tools/goplint/**'
  # Release validation must always run in full, regardless of changed paths.
  release:
    types:
      - published
  workflow_dispatch:

concurrency:
  group: lint-${{ github.ref }}
  cancel-in-progress: true

jobs:
  agent-docs:
    name: agent docs integrity
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Check AGENTS/rules/skills integrity
        run: make check-agent-docs

  golangci-lint:
    name: golangci-lint
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      pull-requests: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.11.3
          # Run full-codebase lint (not just new issues) so CI matches local `make lint`
          only-new-issues: false

  goplint:
    name: goplint (advisory full scan)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    # Advisory only during rollout - does not block PRs
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Build goplint
        run: cd tools/goplint && go build -o ../../bin/goplint .

      - name: Run goplint (advisory)
        run: |
          set +e
          ./bin/goplint -check-all -check-enum-sync -config=tools/goplint/exceptions.toml ./cmd/... ./internal/... ./pkg/...
          status=$?
          if [ "$status" -ne 0 ]; then
            echo "::warning::goplint full scan found findings outside the legacy-pinned baseline regression gate; review the advisory output."
          fi

  goplint-baseline:
    name: goplint (baseline)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: tools/goplint/go.mod
          cache: true

      - name: Build goplint
        run: cd tools/goplint && go build -o ../../bin/goplint .

      - name: Check baseline
        run: |
          make check-baseline

  goplint-tests:
    name: goplint tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: tools/goplint/go.mod
          cache: true

      - name: Run goplint tests (race)
        run: |
          cd tools/goplint
          go test -race -count=1 ./...

      - name: Run goplint tests (repeat)
        run: |
          cd tools/goplint
          go test -count=3 ./...

      - name: Check semantic spec contracts
        run: |
          ./tools/goplint/scripts/check-semantic-spec.sh

      - name: Check IFDS compatibility
        run: |
          ./tools/goplint/scripts/check-ifds-compat.sh

      - name: Check Phase C refinement
        run: |
          ./tools/goplint/scripts/check-cfg-refinement.sh

      - name: Check Phase D alias mode
        run: |
          make check-cfg-alias

      - name: Check CFG benchmark thresholds
        run: |
          ./tools/goplint/scripts/check-cfg-bench-thresholds.sh

  goplint-review-dates:
    name: goplint (overdue reviews)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    # Advisory only - surfaces overdue exception review dates
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: tools/goplint/go.mod
          cache: true

      - name: Build goplint
        run: cd tools/goplint && go build -o ../../bin/goplint .

      - name: Audit overdue review dates
        run: |
          set +e
          ./bin/goplint -audit-review-dates -config=tools/goplint/exceptions.toml ./cmd/... ./internal/... ./pkg/...
          status=$?
          if [ "$status" -ne 0 ]; then
            echo "::warning::goplint found exceptions with overdue review_after dates; check tools/goplint/exceptions.toml."
          fi

  file-length:
    name: file length gate (1000 lines)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Check file lengths
        run: ./scripts/check-file-length.sh
