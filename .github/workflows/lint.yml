name: Lint

on:
  push:
    branches:
      - main
    paths:
      - 'cmd/**'
      - 'internal/**'
      - 'pkg/**'
      - 'tests/**'
      - '*.go'
      - 'go.mod'
      - 'go.sum'
      - '.golangci.toml'
      - 'sonar-project.properties'
      - '.sonarcloud.properties'
      - '.pre-commit-config.yaml'
      - 'Makefile'
      - 'AGENTS.md'
      - '.agents/**'
      - 'scripts/check-agent-docs.sh'
      - 'scripts/check-file-length.sh'
      - 'scripts/golangci-lint.sh'
      - 'scripts/test_golangci_lint.sh'
      - '.github/workflows/lint.yml'
      - '.github/workflows/goplint-fuzz.yml'
      - '.github/workflows/mutation-testing.yml'
      - 'docs/goplint/**'
      - 'openspec/specs/goplint-analysis-soundness/**'
      - 'openspec/specs/goplint-soundness-assurance/**'
      - 'openspec/specs/lint-tooling-quality-gates/**'
      - 'tools/goplint/**'
  pull_request:
    branches:
      - main
    paths:
      - 'cmd/**'
      - 'internal/**'
      - 'pkg/**'
      - 'tests/**'
      - '*.go'
      - 'go.mod'
      - 'go.sum'
      - '.golangci.toml'
      - 'sonar-project.properties'
      - '.sonarcloud.properties'
      - '.pre-commit-config.yaml'
      - 'Makefile'
      - 'AGENTS.md'
      - '.agents/**'
      - 'scripts/check-agent-docs.sh'
      - 'scripts/check-file-length.sh'
      - 'scripts/golangci-lint.sh'
      - 'scripts/test_golangci_lint.sh'
      - '.github/workflows/lint.yml'
      - '.github/workflows/goplint-fuzz.yml'
      - '.github/workflows/mutation-testing.yml'
      - 'docs/goplint/**'
      - 'openspec/specs/goplint-analysis-soundness/**'
      - 'openspec/specs/goplint-soundness-assurance/**'
      - 'openspec/specs/lint-tooling-quality-gates/**'
      - 'tools/goplint/**'
  # Release validation must always run in full, regardless of changed paths.
  release:
    types:
      - published
  workflow_dispatch:

concurrency:
  group: lint-${{ github.ref }}
  cancel-in-progress: true

jobs:
  agent-docs:
    name: agent docs integrity
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Check AGENTS/rules/skills integrity
        run: make check-agent-docs

  golangci-lint:
    name: normalized golangci-lint gates
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      pull-requests: read
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Verify normalized golangci-lint version
        run: ./scripts/golangci-lint.sh version

      - name: Test normalized golangci-lint wrapper
        run: bash scripts/test_golangci_lint.sh

      - name: Run full lint gate
        run: make lint

  goplint:
    name: goplint (canonical full scan)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Build goplint
        run: cd tools/goplint && go build -o ../../bin/goplint .

      - name: Run canonical goplint scan
        run: ./bin/goplint -test=false -check-all -check-enum-sync -baseline=tools/goplint/baseline.toml -config=tools/goplint/exceptions.toml ./cmd/... ./internal/... ./pkg/...

  goplint-baseline:
    name: goplint (baseline)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: tools/goplint/go.mod
          cache: true

      - name: Build goplint
        run: cd tools/goplint && go build -o ../../bin/goplint .

      - name: Check baseline
        run: |
          make check-baseline

  goplint-tests:
    name: goplint tests
    runs-on: ubuntu-latest
    timeout-minutes: 180
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: tools/goplint/go.mod
          cache: true

      # Regular CI executes the causal core profile. The completion-only profile
      # additionally verifies the retained exact-tree record and is run when a
      # soundness change is closed, avoiding a freshness recursion in ordinary CI.
      - name: Run canonical soundness core gate
        run: make check-goplint-soundness-core
        env:
          GOPLINT_BENCH_THRESHOLDS: tools/goplint/bench/thresholds.github-ubuntu-x64-4cpu.toml

  goplint-exceptions:
    name: goplint (exception governance)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: tools/goplint/go.mod
          cache: true

      - name: Build goplint
        run: cd tools/goplint && go build -o ../../bin/goplint .

      - name: Audit stale and overdue exceptions
        run: make check-goplint-exceptions

  file-length:
    name: file length gate (1000 lines)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Check file lengths
        run: ./scripts/check-file-length.sh
