name: Benchmark Upload

on:
  workflow_run:
    workflows:
      - Benchmarks
    types:
      - completed

concurrency:
  group: benchmark-upload-${{ github.event.workflow_run.id }}
  cancel-in-progress: false

env:
  BENCHER_PROJECT: ddfe58db-e86d-49b8-a6c7-60fc46eabf0b
  BENCHER_TESTBED: github-ubuntu-24-04-go-1-26

jobs:
  upload-fork-pr:
    name: Upload Fork PR Benchmarks
    if: github.event.workflow_run.event == 'pull_request' && github.event.workflow_run.conclusion == 'success'
    # GitHub-hosted Ubuntu 26.04 is not available yet. This upload job does
    # not run benchmarks, but it shares the same pinned support boundary.
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      actions: read
      contents: read
      checks: write
      pull-requests: write
    steps:
      - name: Resolve pull request metadata
        id: pr
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          RUN_ID: ${{ github.event.workflow_run.id }}
        run: |
          set -euo pipefail

          pr_number="$(jq -r '.workflow_run.pull_requests[0].number // empty' "$GITHUB_EVENT_PATH")"
          if [[ -z "$pr_number" ]]; then
            echo "No pull request metadata found on workflow_run; nothing to upload."
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          pr_json="$(gh api "repos/$GITHUB_REPOSITORY/pulls/$pr_number")"
          head_repo="$(jq -r '.head.repo.full_name' <<<"$pr_json")"
          if [[ "$head_repo" == "$GITHUB_REPOSITORY" ]]; then
            echo "Pull request is from the base repository; direct Bencher upload already handled it."
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "skip=false" >> "$GITHUB_OUTPUT"
          echo "number=$pr_number" >> "$GITHUB_OUTPUT"
          echo "branch=pr-$pr_number" >> "$GITHUB_OUTPUT"
          echo "head-sha=$(jq -r '.head.sha' <<<"$pr_json")" >> "$GITHUB_OUTPUT"
          echo "base-ref=$(jq -r '.base.ref' <<<"$pr_json")" >> "$GITHUB_OUTPUT"
          echo "base-sha=$(jq -r '.base.sha' <<<"$pr_json")" >> "$GITHUB_OUTPUT"
          echo "run-id=$RUN_ID" >> "$GITHUB_OUTPUT"

      - name: Download benchmark artifact
        if: steps.pr.outputs.skip != 'true'
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          RUN_ID: ${{ steps.pr.outputs.run-id }}
          PR_NUMBER: ${{ steps.pr.outputs.number }}
        run: |
          set -euo pipefail
          mkdir -p artifacts/benchmarks-import
          gh run download "$RUN_ID" \
            --name "bench-bmf-pr-$PR_NUMBER" \
            --dir artifacts/benchmarks-import
          test -s artifacts/benchmarks-import/invowk.bmf.json

      - name: Install Bencher CLI
        if: steps.pr.outputs.skip != 'true'
        uses: bencherdev/bencher@main

      - name: Upload benchmark data to Bencher
        if: steps.pr.outputs.skip != 'true'
        shell: bash
        env:
          BENCHER_API_TOKEN: ${{ secrets.BENCHER_API_TOKEN }}
          GITHUB_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ steps.pr.outputs.number }}
          BENCHER_BRANCH: ${{ steps.pr.outputs.branch }}
          BENCHER_HASH: ${{ steps.pr.outputs.head-sha }}
          BENCHER_START_POINT: ${{ steps.pr.outputs.base-ref }}
          BENCHER_START_POINT_HASH: ${{ steps.pr.outputs.base-sha }}
        run: |
          set -euo pipefail

          bencher run \
            --project "$BENCHER_PROJECT" \
            --branch "$BENCHER_BRANCH" \
            --hash "$BENCHER_HASH" \
            --start-point "$BENCHER_START_POINT" \
            --start-point-hash "$BENCHER_START_POINT_HASH" \
            --start-point-clone-thresholds \
            --start-point-reset \
            --testbed "$BENCHER_TESTBED" \
            --adapter json \
            --file artifacts/benchmarks-import/invowk.bmf.json \
            --github-actions "$GITHUB_TOKEN" \
            --ci-id bmf \
            --ci-number "$PR_NUMBER" \
            --error-on-alert
