name: Mutation Testing

on:
  pull_request:
    branches:
      - main
    paths:
      - "cmd/**/*.go"
      - "internal/**/*.go"
      - "pkg/**/*.go"
      - "tools/goplint/**/*.go"
      - "scripts/mutation.sh"
      - "scripts/test_mutation.sh"
      - "tools/mutation/**"
      - "Makefile"
      - "go.mod"
      - "go.sum"
      - ".github/workflows/mutation-testing.yml"
  schedule:
    - cron: "0 8 * * 2"
  workflow_dispatch:
    inputs:
      module:
        description: "Mutation module profile to run"
        type: choice
        default: all
        options:
          - all
          - root
          - goplint

concurrency:
  group: mutation-testing-${{ github.ref }}
  cancel-in-progress: true

env:
  GOPROXY: "https://proxy.golang.org|direct"
  MUTATION_WORKERS: "2"

jobs:
  pr-advisory:
    name: PR advisory (${{ matrix.module }})
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        module:
          - root
          - goplint
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Fetch PR diff base
        run: git fetch --no-tags origin "${{ github.base_ref }}:refs/remotes/origin/${{ github.base_ref }}"

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Download Go modules
        run: go mod download

      - name: Run changed-line mutation profile
        run: make mutation-pr MUTATION_MODULE="${{ matrix.module }}" MUTATION_BASE_REF="origin/${{ github.base_ref }}" MUTATION_MODE=advisory

      - name: Upload mutation reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: mutation-pr-${{ matrix.module }}
          path: artifacts/mutation/pr/${{ matrix.module }}/
          if-no-files-found: warn

  scheduled-full:
    name: Full advisory
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Download Go modules
        run: go mod download

      - name: Run full mutation profile
        env:
          SELECTED_MODULE: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.module || 'all' }}
        run: make mutation-full MUTATION_MODULE="$SELECTED_MODULE" MUTATION_MODE=advisory

      - name: Upload mutation reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: mutation-full-${{ github.event_name == 'workflow_dispatch' && github.event.inputs.module || 'all' }}
          path: artifacts/mutation/full/
          if-no-files-found: warn
