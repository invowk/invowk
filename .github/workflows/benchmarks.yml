name: Benchmarks

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review
  workflow_dispatch:

concurrency:
  group: benchmarks-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  GOPROXY: "https://proxy.golang.org|direct"
  BENCHER_PROJECT: ddfe58db-e86d-49b8-a6c7-60fc46eabf0b
  BENCHER_TESTBED: bencher-intel-v1-go-1-26
  BENCHER_SPEC: intel-v1
  BENCHER_IMAGE_REPOSITORY: registry.bencher.dev/invowk
  BENCHER_JOB_TIMEOUT: 1800
  BENCH_BMF_OUT: /tmp/invowk.bmf.json
  BENCH_GO_RAW_OUT: /tmp/go-bench.txt

jobs:
  bencher:
    name: Track Benchmarks
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    # GitHub Actions only packages the benchmark image. Bencher runs the actual
    # benchmarks on the bare-metal Spec configured above.
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    permissions:
      contents: read
      checks: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}

      - name: Install Bencher CLI
        uses: bencherdev/bencher@main

      - name: Determine Bencher branch
        id: meta
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          REF_NAME: ${{ github.ref_name }}
          SHA: ${{ github.sha }}
          PR_NUMBER: ${{ github.event.pull_request.number || '' }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha || '' }}
          PR_BASE_REF: ${{ github.event.pull_request.base.ref || '' }}
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha || '' }}
        run: |
          set -euo pipefail

          if [[ "$EVENT_NAME" == "pull_request" ]]; then
            echo "branch=pr-$PR_NUMBER" >> "$GITHUB_OUTPUT"
            echo "hash=$PR_HEAD_SHA" >> "$GITHUB_OUTPUT"
            echo "start-point=$PR_BASE_REF" >> "$GITHUB_OUTPUT"
            echo "start-point-hash=$PR_BASE_SHA" >> "$GITHUB_OUTPUT"
          else
            echo "branch=$REF_NAME" >> "$GITHUB_OUTPUT"
            echo "hash=$SHA" >> "$GITHUB_OUTPUT"
            echo "start-point=" >> "$GITHUB_OUTPUT"
            echo "start-point-hash=" >> "$GITHUB_OUTPUT"
          fi

      - name: Build and push benchmark image
        id: image
        shell: bash
        env:
          BENCHER_API_TOKEN: ${{ secrets.BENCHER_API_TOKEN }}
          BENCHER_IMAGE_TAG: ${{ steps.meta.outputs.hash }}
        run: |
          set -euo pipefail
          source scripts/bencher-registry-login.sh

          image="$BENCHER_IMAGE_REPOSITORY:$BENCHER_IMAGE_TAG"
          run_bencher=false
          skip_reason=""
          docker build --platform linux/amd64 -f build/bencher/Dockerfile -t "$image" .
          bencher_registry_login
          if bencher_registry_push_image "$image"; then
            run_bencher=true
          else
            push_status=$?
            if [[ "$push_status" -eq 75 ]]; then
              skip_reason="bencher-registry-quota"
            else
              exit "$push_status"
            fi
          fi
          {
            echo "image=$image"
            echo "run-bencher=$run_bencher"
            echo "skip-reason=$skip_reason"
          } >> "$GITHUB_OUTPUT"

      - name: Track benchmark data in Bencher
        if: steps.image.outputs['run-bencher'] == 'true'
        shell: bash
        env:
          BENCHER_API_TOKEN: ${{ secrets.BENCHER_API_TOKEN }}
          GITHUB_TOKEN: ${{ github.token }}
          BENCHER_BRANCH: ${{ steps.meta.outputs.branch }}
          BENCHER_HASH: ${{ steps.meta.outputs.hash }}
          BENCHER_START_POINT: ${{ steps.meta.outputs.start-point }}
          BENCHER_START_POINT_HASH: ${{ steps.meta.outputs.start-point-hash }}
          BENCHER_IMAGE: ${{ steps.image.outputs.image }}
          BENCHER_ERROR_ON_ALERT: "${{ github.event_name == 'pull_request' && !contains(github.event.pull_request.labels.*.name, 'benchmarks: accepted-regression') }}"
        run: |
          set -euo pipefail
          source scripts/bencher-threshold-args.sh

          start_point_args=()
          if [[ -n "$BENCHER_START_POINT" ]]; then
            start_point_args=(
              --start-point "$BENCHER_START_POINT"
              --start-point-hash "$BENCHER_START_POINT_HASH"
              --start-point-clone-thresholds
              --start-point-reset
            )
          fi

          threshold_args=()
          bencher_threshold_args threshold_args
          alert_args=()
          bencher_error_on_alert_args alert_args
          github_actions_args=()
          bencher_github_actions_args github_actions_args bmf

          bencher run \
            --project "$BENCHER_PROJECT" \
            --branch "$BENCHER_BRANCH" \
            --hash "$BENCHER_HASH" \
            --testbed "$BENCHER_TESTBED" \
            --spec "$BENCHER_SPEC" \
            --image "$BENCHER_IMAGE" \
            --job-timeout "$BENCHER_JOB_TIMEOUT" \
            --job-poll-interval 5 \
            --adapter json \
            --file "$BENCH_BMF_OUT" \
            "${github_actions_args[@]}" \
            "${threshold_args[@]}" \
            "${alert_args[@]}" \
            "${start_point_args[@]}" \
            "GOPROXY=off GOSUMDB=off GOFLAGS=-mod=vendor node scripts/bench-bmf.mjs --output '$BENCH_BMF_OUT' --raw-go-output '$BENCH_GO_RAW_OUT'"

  fork-pr-artifact:
    name: Benchmark Fork PR
    if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name != github.repository
    # The trusted workflow_run handler builds the image and asks Bencher to run
    # benchmarks on bare metal. This job only creates a successful trigger.
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - name: Defer fork PR benchmarks to trusted bare-metal workflow
        run: echo "Fork PR benchmark execution is handled by benchmarks-upload.yml on Bencher bare metal."
