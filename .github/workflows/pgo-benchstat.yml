name: PGO Benchstat

on:
  schedule:
    # Weekly run every Monday at 07:00 UTC.
    - cron: '0 7 * * 1'
  workflow_dispatch:

concurrency:
  group: pgo-benchstat-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  compare:
    name: Compare PGO On/Off
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Install benchstat
        run: go install golang.org/x/perf/cmd/benchstat@v0.0.0-20260211190930-8161c38c6cdc

      - name: Run benchmark batches (PGO off vs on)
        env:
          BENCH_TIME: "1s"
          BENCH_COUNT: "10"
        run: |
          set -euo pipefail

          mkdir -p artifacts/pgo-benchstat

          go test -pgo=off ./internal/benchmark -run=^$ -bench=. -benchmem -benchtime="$BENCH_TIME" -count="$BENCH_COUNT" -short > artifacts/pgo-benchstat/pgo-off.txt
          go test ./internal/benchmark -run=^$ -bench=. -benchmem -benchtime="$BENCH_TIME" -count="$BENCH_COUNT" -short > artifacts/pgo-benchstat/pgo-on.txt

      - name: Generate benchstat report
        run: |
          set -euo pipefail

          benchstat artifacts/pgo-benchstat/pgo-off.txt artifacts/pgo-benchstat/pgo-on.txt > artifacts/pgo-benchstat/benchstat.txt

          {
            echo "# PGO Benchstat Report"
            echo
            echo "- Generated: $(date -u +'%Y-%m-%dT%H:%M:%SZ')"
            echo "- Commit: $GITHUB_SHA"
            echo "- Runner: ubuntu-latest"
            echo "- Command (off): \`go test -pgo=off ./internal/benchmark -run=^$ -bench=. -benchmem -benchtime=1s -count=10 -short\`"
            echo "- Command (on): \`go test ./internal/benchmark -run=^$ -bench=. -benchmem -benchtime=1s -count=10 -short\`"
            echo
            echo '```text'
            cat artifacts/pgo-benchstat/benchstat.txt
            echo '```'
          } > artifacts/pgo-benchstat/benchstat.md

          {
            echo "## PGO Benchstat"
            echo
            echo '```text'
            cat artifacts/pgo-benchstat/benchstat.txt
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload benchmark comparison artifacts
        uses: actions/upload-artifact@v7
        with:
          name: pgo-benchstat-${{ github.run_id }}
          path: artifacts/pgo-benchstat/
          retention-days: 30
