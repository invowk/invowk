name: Release Benchmark Asset

# Benchmark reports are normally generated inline by the release workflow and
# included via GoReleaser extra_files. This workflow serves as a manual fallback
# for attaching a report to an existing (non-immutable) release retroactively.
on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to attach benchmark report to (e.g., v1.2.3)"
        required: true
        type: string

concurrency:
  group: release-bench-report-${{ github.event.inputs.tag || github.run_id }}
  cancel-in-progress: false

jobs:
  attach-benchmark-report:
    name: Attach Benchmark Report
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: write
    steps:
      - name: Determine tag
        id: tag
        env:
          DISPATCH_TAG: ${{ github.event.inputs.tag }}
        run: |
          set -euo pipefail

          if [[ -z "$DISPATCH_TAG" ]]; then
            echo "::error::Could not determine release tag"
            exit 1
          fi

          echo "name=$DISPATCH_TAG" >> "$GITHUB_OUTPUT"
          echo "Resolved tag: $DISPATCH_TAG"

      - name: Checkout tag
        uses: actions/checkout@v6
        with:
          ref: ${{ steps.tag.outputs.name }}
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Verify gh CLI
        run: gh --version

      - name: Verify release exists
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.tag.outputs.name }}
        run: |
          set -euo pipefail
          gh release view "$TAG" --json name --jq '.name' >/dev/null

      - name: Generate benchmark report
        env:
          TAG: ${{ steps.tag.outputs.name }}
          STARTUP_SAMPLES: "40"
          BENCH_COUNT: "5"
          BENCH_REPORT_OUT_DIR: ${{ runner.temp }}/release-benchmarks
        run: scripts/stage-release-bench-report.sh

      - name: Resolve generated reports
        id: reports
        run: |
          set -euo pipefail

          mapfile -t reports < <(find release-assets -maxdepth 1 -type f \( -name '*.md' -o -name '*.json' -o -name '*.svg' -o -name '*.txt' \) | sort)
          count="${#reports[@]}"
          if [[ "$count" -ne 4 ]]; then
            echo "::error::Expected exactly 4 staged benchmark assets in release-assets, found $count"
            if [[ "$count" -gt 0 ]]; then
              printf 'Found files:\n%s\n' "${reports[@]}"
            fi
            exit 1
          fi

          printf '%s\n' "${reports[@]}" > /tmp/benchmark-assets.txt

          echo "manifest=/tmp/benchmark-assets.txt" >> "$GITHUB_OUTPUT"
          echo "Report assets:"
          cat /tmp/benchmark-assets.txt

      - name: Upload benchmark report assets
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.tag.outputs.name }}
          MANIFEST: ${{ steps.reports.outputs.manifest }}
        run: |
          set -euo pipefail
          while IFS= read -r report_path; do
            asset_name="$(basename "$report_path")"
            gh release upload "$TAG" "${report_path}#${asset_name}" --clobber
          done < "$MANIFEST"

      - name: Verify uploaded assets
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.tag.outputs.name }}
          MANIFEST: ${{ steps.reports.outputs.manifest }}
        run: |
          set -euo pipefail
          gh release view "$TAG" --json assets --jq '.assets[].name' > /tmp/release-assets.txt
          while IFS= read -r report_path; do
            asset_name="$(basename "$report_path")"
            grep -Fx "$asset_name" /tmp/release-assets.txt >/dev/null
            echo "Verified release asset '$asset_name' on tag '$TAG'."
          done < "$MANIFEST"
